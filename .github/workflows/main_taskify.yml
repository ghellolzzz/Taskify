name: Deploy Taskify to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules/**
            !test-results/**
            !playwright-report/**
            !playwright-report.html
            !coverage/**
            !.git/**
            !.github/**
            !.vscode/**
            !*.log
        

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prepare build directory
        run: |
          mkdir build
          cp package.json build/
          cp package-lock.json build/
          cp -r prisma build/
          cp -r src build/
          cp -r node_modules build/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          
      - name: Login to Azure
        uses: azure/login@v2
        with:
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B4DEB4821E3847958F1DF97C0FD660ED }}
          tenant-id:  ${{ secrets.AZUREAPPSERVICE_TENANTID_7604ff02-abd8-45db-8cac-550054323fc9 }}
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_d35436a2-f1a7-4573-8712-b8f210c12a7e}}
          

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Taskify
          package: .








