name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # pulls the latest code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # installing the node version
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # install project dependencies from package.json
      - name: Install dependencies
        run: npm ci
      
      # generates the Prisma client based on the schema
      - name: Generate Prisma Client
        run: npx prisma generate
      
      # runs all database migrations to the temp database
      - name: Run Prisma migrations (test DB)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: npx prisma migrate deploy
      
      # seeds the database with test data 
      - name: Seed test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: npx prisma db seed
      #installing playwright test 
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          for i in {1..20}; do
          pg_isready -h localhost -U postgres && break
          sleep 3
          done  
      
     
      
      # runs all Playwright E2E tests
      - name: Run Playwright E2E tests
        run: npm test
      
      # uploads the test report for review
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30