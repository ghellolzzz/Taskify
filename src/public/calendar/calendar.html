<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify | Calendar</title>
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
            <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="../reminder/reminder.html"><i class="bi bi-bell"></i> Reminder</a></li>
            <li><a href="../goal/goal.html"><i class="bi bi-bullseye"></i> Goals</a></li>
            <li><a href="../habit/habits.html"><i class="bi bi-repeat"></i> Habits</a></li>
            <li><a class="active" href="../calendar/calendar.html"><i class="bi bi-calendar-event"></i> Calender</a></li>
            <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
            <li><a href="../feedback/feedback.html"><i class="bi bi-envelope-paper"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Calendar Header -->
        <div class="calendar-header">
            <button id="back-btn" class="back-btn">
                <i class="bi bi-arrow-left"></i> Back
            </button>
            <div class="calendar-controls">
                <button id="prev-month" class="nav-btn">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <h2 id="current-month-year" class="month-year-title"></h2>
                <button id="next-month" class="nav-btn">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Month View -->
        <div id="month-view" class="calendar-view">
            <div class="calendar-weekdays">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Calendar days will be dynamically generated here -->
            </div>
        </div>

        <!-- Year View -->
        <div id="year-view" class="calendar-view year-view" style="display: none;">
            <div id="year-grid" class="year-grid">
                <!-- Year months will be dynamically generated here -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer mt-4">
            <p>© 2025 Taskify. All rights reserved.</p>
        </footer>
    </main>

    <script src="calendar.js"></script>
</body>
</html>
