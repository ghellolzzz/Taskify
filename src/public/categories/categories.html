<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>My Task Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="categories.css">
    </head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
            <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li> <a href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a class="active" href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="../reminder/reminder.html"><i class="bi bi-bell"></i> Reminder</a></li>
            <li><a href="../goal/goal.html"><i class="bi bi-bullseye"></i> Goals</a></li>
            <li><a href="../habit/habits.html"><i class="bi bi-repeat"></i> Habits</a></li>
            <li><a href ="../calendar/calendar.html"><i class="bi bi-calendar-event"></i>Calender</a></li>
            <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
            <li><a href="../feedback/feedback.html"><i class="bi bi-envelope-paper"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- MAIN BODY -->
    <main class="main-content">

        <div class="page-header">
            <h2>Categories</h2>
            <button class="add-category-btn">
                <i class="bi bi-plus"></i> Add Category
            </button>
        </div>

    <!-- New Category Input -->
<div id="new-category-container" style="display:none; margin-top: 20px; padding: 15px; border-radius: 12px;  background-color: #ffffff; color: #fff; box-shadow: 0 4px 8px rgba(151, 149, 149, 0.2); max-width: 350px; 
     border: 3px solid #28a745;">
    <div id="category-preview"  style="display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.95em; 
            margin-bottom: 12px; background-color: #28a745; color: #fff; font-weight: 500;">
        New Category
    </div>
    <input type="text" id="new-category-name" placeholder="Category Name" maxlength="25"
       style="width: 100%; padding: 8px 12px; border-radius: 10px; border: 3px solid #28a745; 
              margin-bottom: 10px; background-color: #ffffff; color: #000000; font-size: 0.95em; outline: none;" />


    <input type="hidden" id="new-category-color" value="#28a745" />

    <div id="color-swatches" style="display: flex; gap: 8px; margin-bottom: 15px;">
        <span class="color-swatch" data-color="#28a745" style="width: 28px; height: 28px; border-radius: 50%; background-color: #28a745; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#007bff" style="width: 28px; height: 28px; border-radius: 50%; background-color: #007bff; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#ffc107" style="width: 28px; height: 28px; border-radius: 50%; background-color: #ffc107; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#dc3545" style="width: 28px; height: 28px; border-radius: 50%; background-color: #dc3545; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#6f42c1" style="width: 28px; height: 28px; border-radius: 50%; background-color: #6f42c1; cursor: pointer; border: 2px solid #fff;"></span>
    </div>

    <!-- Submit Button -->
    <button id="submit-category" style="width: 100%; padding: 10px 0; border-radius: 25px; border: none; background-color: #28a745; color: #fff; font-size: 1em; font-weight: 600; cursor: pointer; transition: 0.3s;">
        Add Category
    </button>

</div>
<!-- Edit category card -->
<div id="edit-category-container" style="display:none; margin-top: 20px; padding: 15px; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 8px rgba(151, 149, 149, 0.2); max-width: 350px; border: 3px solid #28a745;">
    <div id="edit-category-preview" style="display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.95em; margin-bottom: 12px; background-color: #28a745; color: #fff; font-weight: 500;">
        Edit Category
    </div>
    <input type="text" id="edit-category-name" placeholder="Category Name" maxlength="25"
        style="width: 100%; padding: 8px 12px; border-radius: 10px; border: 3px solid #28a745; margin-bottom: 10px; background-color: #ffffff; color: #000000; font-size: 0.95em; outline: none;" />

    <input type="hidden" id="edit-category-color" value="#28a745" />

    <div id="edit-color-swatches" style="display: flex; gap: 8px; margin-bottom: 15px;">
        <span class="color-swatch" data-color="#28a745" style="width: 28px; height: 28px; border-radius: 50%; background-color: #28a745; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#007bff" style="width: 28px; height: 28px; border-radius: 50%; background-color: #007bff; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#ffc107" style="width: 28px; height: 28px; border-radius: 50%; background-color: #ffc107; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#dc3545" style="width: 28px; height: 28px; border-radius: 50%; background-color: #dc3545; cursor: pointer; border: 2px solid #fff;"></span>
        <span class="color-swatch" data-color="#6f42c1" style="width: 28px; height: 28px; border-radius: 50%; background-color: #6f42c1; cursor: pointer; border: 2px solid #fff;"></span>
    </div>

    <button id="update-category" style="width: 100%; padding: 10px 0; border-radius: 25px; border: none; background-color: #28a745; color: #fff; font-size: 1em; font-weight: 600; cursor: pointer; transition: 0.3s;">
        Update Category
    </button>
</div>

    <!-- Categories Grid -->
    <div class="categories-grid">
        <!-- Category cards will be injected here by JS -->
    </div>

<!-- Task table -->
<section id="category-tasks-section" style="display:none; margin-top: 30px;">
  <div class="tasks-card">
    <div class="tasks-header">
      <h2 id="selected-category-title"></h2>
      <button id="backToCategoriesBtn" class="back-btn">Back to Categories</button>
    </div>

    <div class="table-container">
      <table id="tasks-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Description</th>
            <th>Due Date</th>
          </tr>
        </thead>
        <tbody id="tasks-table-body"></tbody>
      </table>
    </div>
  </div>
</section>



        <footer class="footer mt-4">
            <p>© 2025 Taskify. All rights reserved.</p>
        </footer>

    </main>
<script src="categories.js"></script>
</body>
</html>
