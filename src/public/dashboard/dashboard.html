<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify Dashboard</title>
    <link rel="stylesheet" href="../dashboard/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

         <ul class="nav flex-column mt-4">
             <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a class="active" href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="/calendar.html"><i class="bi bi-calendar-event"></i> Calendar</a></li>
            <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard">
        <h1>Welcome, <span class="accent">Bigga👋</span></h1>

        <!-- Stats Cards -->
        <div class="stats-container">
            <div class="stat-card total">
                <h3>Total Tasks</h3>
                <p class="number"id="totalTasks">0</p>
            </div>

            <div class="stat-card completed">
                <h3>Completed</h3>
                <p class="number" id="completedTasks">0</p>
            </div>

            <div class="stat-card progress">
                <h3>In Progress</h3>
                <p class="number" id="progressTasks">0</p>
            </div>

            <div class="stat-card pending">
                <h3>Pending</h3>
                <p class="number" id="pendingTasks">0</p>
            </div>
        </div>

        <!-- Placeholder Chart -->
        <div class="chart-placeholder">
            <p><i class="bi bi-pie-chart"></i> Task Breakdown Chart Coming Soon</p>
        </div>
    </main>

    <footer class="footer mt-4">
        <p>© 2025 Taskify. All rights reserved.</p>
    </footer>

    <script src="dashboard.js" type="text/javascript"></script>
</body>

</html>
