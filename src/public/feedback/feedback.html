<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Feedback Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="feedback.css"> 
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
            <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li> <a href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a class="active" href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="../reminder/reminder.html"><i class="bi bi-bell"></i> Reminder</a></li>
            <li><a href="../goal/goal.html"><i class="bi bi-bullseye"></i> Goals</a></li>
            <li><a href="../teams/teams.html"><i class="bi bi-people-fill"></i> Teams</a></li>
            <li><a href="../habit/habits.html"><i class="bi bi-repeat"></i> Habits</a></li>
            <li><a href ="../calendar/calendar.html"><i class="bi bi-calendar-event"></i>Calender</a></li>
            <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
            <li><a href="../feedback/feedback.html"><i class="bi bi-envelope-paper"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Body -->
    <main class="main-content">

        <h2>Submit Feedback</h2>
        
        <div id="feedback-message" class="alert" style="display: none;"></div>
        
        <div class="feedback-form-card">
            <form id="feedbackForm">
                
                <label for="type">Feedback Type <span class="required">*</span></label>
                <select id="type" name="type" required>
                    <option value="BUG">Bug Report</option>
                    <option value="FEATURE_REQUEST">Feature Request</option>
                    <option value="GENERAL_COMMENT" selected>General Comment</option>
                </select>

                <label for="description">Details / Description <span class="required">*</span></label>
                <textarea id="description" name="description" rows="6" maxlength="1000" placeholder="Please provide details about the issue or suggestion..." required></textarea>
                
                <button type="submit" id="submitFeedbackBtn">Submit Feedback</button>
            </form>
        </div>

        <footer class="footer mt-4">
            <p>© 2025 Taskify. All rights reserved.</p>
        </footer>
    </main>

    <script src="feedback.js"></script>
</body>
</html>
