<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Focus Mode</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="focus-wrapper">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>
        
        <div id="menu-view">
            <h1>Choose Your Focus Fuel</h1>
            <p>The drink is your timer. Finish the task before the cup is empty.</p>

            <div class="drink-options">
                <div class="drink-card" onclick="focusApp.startSession('coffee', 5)">
                    <div class="icon">☕</div>
                    <h3>Espresso</h3>
                    <p>5 Mins</p>
                </div>

                <div class="drink-card featured" onclick="focusApp.startSession('matcha', 30)">
                    <div class="icon">🍵</div>
                    <h3>Matcha Latte</h3>
                    <p>30 Mins</p>
                    <span class="badge">Recommended</span>
                </div>

                <div class="drink-card" onclick="focusApp.startSession('water', 60)">
                    <div class="icon">💧</div>
                    <h3>Ice Water</h3>
                    <p>1 Hour</p>
                </div>
            </div>

            <div style="text-align: center; margin: 40px 0 0 0;">
                <button id="open-shop-btn" class="btn-shop" style="background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1rem;">
                    🛍️ Theme Shop
                </button>
            </div>
            
            <div class="exit-container">
                <a href="../dashboard/dashboard.html" class="btn-home">Turn Off Focus Mode</a>
            </div>
        </div>

        <div id="focus-view" class="hidden">
            <div class="cup-container">
                <div class="cup-body">
                    <div id="liquid" class="liquid-matcha"></div>
                </div>
                <div class="cup-handle"></div>
            </div>

            <h2 id="timer-display"></h2>
            <p id="focus-status">Stay focused...</p>
            
            <button type="button" onclick="focusApp.giveUp()" class="btn-giveup">Give Up (Spill Drink)</button>
        </div>

    </div>

    <div id="shop-modal" class="modal hidden" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);">
        <div class="modal-content" style="background-color: var(--modal-bg); margin: 10% auto; padding: 20px; border: 2px solid var(--primary-color); width: 80%; max-width: 600px; border-radius: 15px; position: relative;">
            
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">🎨 Theme Shop</h2>
                <span id="close-shop" class="close-btn" style="font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            </div>
            
            <div class="modal-body">
                <div style="text-align: right; margin-bottom: 15px;">
                    <span class="currency-display" style="background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold;">
                        ☕ Beans: <span id="user-points">0</span>
                    </span>
                </div>

                <div id="shop-container" class="shop-grid">
                    </div>
            </div>
        </div>
    </div>
    
    <script src="focus.js"></script>
    <script src="shop.js"></script>
</body>
</html>
