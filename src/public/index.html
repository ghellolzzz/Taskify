<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Task Management App</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .home-container {
            text-align: center;
            padding: 60px 20px;
        }
        .home-header h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .home-header p {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .home-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .home-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .home-btn-primary {
            background: #198754;
            color: #ffffff;
        }
        .home-btn-primary:hover {
            background: #157347;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 135, 84, 0.3);
        }
        .home-btn-secondary {
            background: #ffffff;
            color: #198754;
            border: 2px solid #198754;
        }
        .home-btn-secondary:hover {
            background: #e9f7ef;
        }
    </style>
</head>
<body>
    <div class="auth-container home-container">
        <div class="home-header">
            <h1><i class="bi bi-list-task"></i> Taskify</h1>
            <p>A simple way to organize and track your daily tasks.</p>
        </div>

        <div class="home-actions">
            <a href="login.html" class="home-btn home-btn-primary">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a href="register.html" class="home-btn home-btn-secondary">
                <i class="bi bi-person-plus"></i> Register
            </a>
        </div>
    </div>
</body>
</html>
