<!DOCTYPE html>
<html>
  <head>
    <title>My Web App</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <h1>My Web App</h1>
<!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
            <li><a class="active" href="./dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/tasks/tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="/analytics.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="/calendar.html"><i class="bi bi-calendar-event"></i> Calendar</a></li>
            <li><a href="/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>
    <!-- Form to add new something -->
    <form id="somethingForm">
      <p>
        <label for="somethingName">Name:</label>
        <input type="text" id="somethingName" name="somethingName" required />
      </p>
      <button type="submit">Enter</button>
    </form>

    <h2>Table</h2>

    <!-- Table to view all somethings -->
    <table>
      <thead>
        <tr>
          <th>Id</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="somethingsTableBody">
        <!-- Rows will be populated by JavaScript -->
      </tbody>
    </table>

    <!-- Template for something row -->
    <template id="somethingRowTemplate">
      <tr>
        <td class="something-id"></td>
        <td class="something-name"></td>
        <td><button class="delete-button">Delete</button></td>
      </tr>
    </template>

    <script src="./index.js" type="text/javascript"></script>
  </body>
</html>
