<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Taskify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="floating-icons">
        <i class="bi bi-check2-square floating-icon"></i>
        <i class="bi bi-at floating-icon"></i>
        <i class="bi bi-hash floating-icon"></i>
        <i class="bi bi-pencil floating-icon"></i>
        <i class="bi bi-pen floating-icon"></i>
        <i class="bi bi-lightbulb floating-icon"></i>
        <i class="bi bi-calculator floating-icon"></i>
        <i class="bi bi-calendar-event floating-icon"></i>
        <i class="bi bi-list-task floating-icon"></i>
        <i class="bi bi-clock floating-icon"></i>
        <i class="bi bi-star floating-icon"></i>
        <i class="bi bi-tag floating-icon"></i>
        <i class="bi bi-bookmark floating-icon"></i>
        <i class="bi bi-file-text floating-icon"></i>
        <i class="bi bi-bullseye floating-icon"></i>
    </div>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="bi bi-list-task"></i> Taskify</h1>
            <p>Welcome back! Please login to your account.</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="form-group" style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                <a href="forgot-password.html" style="color: #1E90FF; text-decoration: none; font-size: 0.9em;">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
