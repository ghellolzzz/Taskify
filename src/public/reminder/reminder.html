<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../reminder/style.css">
</head>
<body>
    <aside class="sidebar">
    <div class="brand">
        <i class="bi bi-list-task"></i>
        <span>Taskify</span>
    </div>

    <ul class="nav flex-column mt-4">
        <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li> <a href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
        <li><a href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
        <li><a class="active" href="reminder.html"><i class="bi bi-bell"></i> Reminder</a></li>
        <li><a href="../goal/goal.html"><i class="bi bi-bullseye"></i> Goals</a></li>
        <li><a href="../teams/teams.html"><i class="bi bi-people-fill"></i> Teams</a></li>
        <li><a href="../habit/habits.html"><i class="bi bi-repeat"></i> Habits</a></li>
        <li><a href ="../calendar/calendar.html"><i class="bi bi-calendar-event"></i>Calender</a></li>
        <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
        <li><a href="../feedback/feedback.html"><i class="bi bi-envelope-paper"></i> Feedback</a></li>
    </ul>

    <div class="sidebar-footer">
        <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
    </aside>

    <div class="container mt-4">
        <!-- SECTION 1: Today's Summary -->
        <div class="summary-box mb-4 p-3 rounded shadow-sm">
            <h4>Today's Reminders</h4>
            <div class="summary-row d-flex gap-3 mt-3">
            <div class="mini-card"><i class="bi bi-bell"></i> <span id="sumToday">0 Today</span></div>
            <div class="mini-card"><i class="bi bi-clock-history"></i> <span id="sumUpcoming">0 Upcoming</span></div>
            <div class="mini-card"><i class="bi bi-exclamation-circle"></i> <span id="sumOverdue">0  Overdue</span></div>
            <div class="mini-card"><i class="bi bi-check2-circle"></i> <span id="sumDone">0 Done</span></div>
            </div>
        </div>

        <div class="d-flex gap-4">
            <!-- LEFT: Reminders Table -->
            <div class="flex-grow-1">

            <div class="card p-3 shadow-sm">
                <h5>Manage Reminders</h5>

                <table class="table mt-3" id="reminderTable">
                <thead>
                    <tr>
                    <th>#</th>
                    <th>Date</th>
                    <th>Title</th>
                    <th>Notes</th>
                    <th>Task</th>
                    <th>Status</th>
                    <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
                </table>
            </div>
            </div>
        <!-- EDIT REMINDER MODAL -->
        <div class="modal" id="editModal">
            <div class="modal-content">
                <span class="modal-close" onclick="closeEditModal()">&times;</span>
                <h4>Edit Reminder</h4>

                <input type="hidden" id="editId">

                <label>Title</label>
                <input id="editTitle" class="form-control">

                <label>Notes</label>
                <textarea id="editNotes" class="form-control"></textarea>

                <label>Task</label>
                <select id="editTask" class="form-control"></select>

                <label>Remind At</label>
                <input type="datetime-local" id="editDate" class="form-control">

                <label>Repeat</label>
                <select id="editRepeat" class="form-control">
                <option value="none">None</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                </select>

                <button class="btn btn-success mt-3" onclick="saveReminderChanges()">Save</button>
            </div>
        </div>

            <!-- RIGHT: Add Reminder -->
        <div style="width: 380px;">
            <div class="card p-3 shadow-sm">
                <h5>Create Reminder</h5>

                <div class="mt-3">
                <label>Title</label>
                <input class="form-control" id="rTitle">

                <label class="mt-2">Notes</label>
                <textarea class="form-control" id="rNotes"></textarea>

                <label class="mt-2">Link Task</label>
                <select class="form-control" id="rTask"></select>

                <label class="mt-2">Date & Time</label>
                <input type="datetime-local" class="form-control" id="rDate">

                <label class="mt-2">Repeat</label>
                <select class="form-control" id="rRepeat">
                    <option value="none">None</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>

                <button class="btn btn-success w-100 mt-3" onclick="createReminder()">Create Reminder</button>
                </div>
            </div>
            </div>
        </div>

    </div>

<script src="reminder.js" type="text/javascript"></script>



</body>
</html>
