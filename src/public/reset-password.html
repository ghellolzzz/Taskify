<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Taskify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="floating-icons">
        <i class="bi bi-check2-square floating-icon"></i>
        <i class="bi bi-at floating-icon"></i>
        <i class="bi bi-hash floating-icon"></i>
        <i class="bi bi-pencil floating-icon"></i>
        <i class="bi bi-pen floating-icon"></i>
        <i class="bi bi-lightbulb floating-icon"></i>
        <i class="bi bi-calculator floating-icon"></i>
        <i class="bi bi-calendar-event floating-icon"></i>
        <i class="bi bi-list-task floating-icon"></i>
        <i class="bi bi-clock floating-icon"></i>
        <i class="bi bi-star floating-icon"></i>
        <i class="bi bi-tag floating-icon"></i>
        <i class="bi bi-bookmark floating-icon"></i>
        <i class="bi bi-file-text floating-icon"></i>
        <i class="bi bi-bullseye floating-icon"></i>
    </div>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="bi bi-list-task"></i> Taskify</h1>
            <p>Enter your new password below.</p>
        </div>

        <form id="resetPasswordForm" class="auth-form">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    name="newPassword" 
                    placeholder="Enter your new password (min. 6 characters)"
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Confirm your new password"
                    required
                    minlength="6"
                >
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <p>Remember your password? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="reset-password.js"></script>
</body>
</html>
