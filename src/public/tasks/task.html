<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify | My Tasks</title>

     <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!--Js-->
    <script defer src="task.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!--Sidebar-->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
             <li><a href="/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a class="active" href="/tasks/tasks.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="/analytics.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="/calendar.html"><i class="bi bi-calendar-event"></i> Calendar</a></li>
            <li><a href="/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
             <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!--Main content-->
    <main class="main-content">
        <header class="top-header">
            <h2>My tasks</h2>
            <button id="show-add-form" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Add Task
            </button>
        </header>

        <!-- user adding task card -->
<div id="add-task-card" class="card add-task-card d-none">
    <div class="card-body">
        <h5 class="mb-3">Create New Task</h5>

        <form id="add-task-form">
            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text" id="title" class="form-control"
                           placeholder="Task Title" required>
                </div>

                <div class="col-md-4">
                    <input type="text" id="description" class="form-control"
                           placeholder="Description">
                </div>

                <div class="col-md-2">
                    <input type="date" id="dueDate" class="form-control">
                </div>

                <div class="col-md-2">
                    <select id="priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

            </div>

            <button class="btn btn-success mt-3">Create Task</button>
        </form>
    </div>
</div>

<div id="task-card-container" class="task-card-container mt-4"></div>
    </main>
    <!-- Footer -->
        <footer class="footer mt-4">
            <p>© 2025 Taskify. All rights reserved.</p>
        </footer>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
