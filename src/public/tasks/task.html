<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskify | My Tasks</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css"/>

    <!-- Scripts -->
    <script defer src="task.js"></script>
</head>

<body class="bg-light">

    <div id="header-container"></div>

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center">
            <h1 class="text-success fw-bold">My Tasks</h1>

            <button id="show-add-form" class="btn btn-success">
                + Add Task
            </button>
        </div>

        <!-- ADD TASK FORM (HIDDEN) -->
        <div id="add-task-card" class="card p-4 mt-3 d-none shadow-sm">
            <h4 class="text-success mb-3">Create New Task</h4>

            <form id="add-task-form" class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Title</label>
                    <input type="text" id="title" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Priority</label>
                    <select id="priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Description</label>
                    <input type="text" id="description" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Due Date</label>
                    <input type="date" id="dueDate" class="form-control" />
                </div>

                <div class="col-12">
                    <button class="btn btn-success px-4">Create</button>
                </div>
            </form>
        </div>

        <!-- TASKS TABLE -->
        <div class="card mt-4 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-success">
                        <tr>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Due</th>
                            <th>Comments</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="task-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Edit Task</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input id="edit-title" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <input id="edit-description" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" id="edit-dueDate" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <select id="edit-priority" class="form-select">
                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select id="edit-status" class="form-select">
                            <option>Pending</option>
                            <option>In Progress</option>
                            <option>Completed</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="save-edit" class="btn btn-success">Save</button>
                </div>

            </div>
        </div>
    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
