<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify | My Tasks</title>

     <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

   
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!--Sidebar-->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-list-task"></i>
            <span>Taskify</span>
        </div>

        <ul class="nav flex-column mt-4">
             <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a class="active" href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
            <li><a href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
            <li><a href="/calendar.html"><i class="bi bi-calendar-event"></i> Calendar</a></li>
            <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
             <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!--Main content-->
    <main class="main-content">
        <header class="top-header">
            <h2>My tasks</h2>
            <button id="show-add-form" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Add Task
            </button>
        </header>

        <!-- Task card for letting user to add task -->
<div id="add-task-card" class="card add-task-card d-none">
    <div class="card-body">
        <h5 class="mb-3">Create New Task</h5>

        <form id="add-task-form">
            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text" id="title" class="form-control"
                           placeholder="Task Title" required>
                </div>

                <div class="col-md-4">
                    <input type="text" id="description" class="form-control"
                           placeholder="Description">
                </div>

                <div class="col-md-2">
                    <input type="date" id="dueDate" class="form-control">
                </div>

                <div class="col-md-2">
                    <select id="priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

            </div>

            <button class="btn btn-success mt-3">Create Task</button>
        </form>
    </div>
</div>

<div id="task-card-container" class="task-card-container mt-4"></div>
    </main>
    <!-- editing modal for the user to edit the task -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Task</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="edit-task-form">
          <input type="hidden" id="edit-task-id">

          <div class="mb-3">
            <label>Title</label>
            <input id="edit-title" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Description</label>
            <textarea id="edit-desc" class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label>Due Date</label>
            <input type="date" id="edit-date" class="form-control">
          </div>

          <div class="mb-3">
            <label>Priority</label>
            <select id="edit-priority" class="form-select">
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Status</label>
            <select id="edit-status" class="form-select">
              <option>Pending</option>
              <option>In Progress</option>
              <option>Completed</option>
            </select>
          </div>

          <button class="btn btn-primary w-100">Save Changes</button>

        </form>
      </div>

    </div>
  </div>
</div>

    <!-- Footer -->
        <footer class="footer mt-4">
            <p>© 2025 Taskify. All rights reserved.</p>
        </footer>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
       <!--Js-->
    <script defer src="task.js"></script>
</body>
</html>
