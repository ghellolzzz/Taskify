<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskify | My Teams</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">


  <link rel="stylesheet" href="../tasks/style.css">
  <link rel="stylesheet" href="style.css">
    <script src="/js/theme.js" defer></script>

</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <i class="bi bi-list-task"></i> <span>Taskify</span>
    </div>

    <ul class="nav flex-column mt-4">
      <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="../tasks/task.html"><i class="bi bi-check2-square"></i> Tasks</a></li>
      <li><a href="../categories/categories.html"><i class="bi bi-tags"></i> Task Categories</a></li>
      <li><a href="../reminder/reminder.html"><i class="bi bi-bell"></i> Reminder</a></li>
      <li><a href="../goal/goal.html"><i class="bi bi-bullseye"></i> Goals</a></li>
      <li><a class="active" href="../teams/teams.html"><i class="bi bi-people-fill"></i> Teams</a></li>
      <li><a href="../community/community.html"><i class="bi bi-chat-heart"></i> Community</a></li>
      <li><a href="../habit/habits.html"><i class="bi bi-repeat"></i> Habits</a></li>
      <li><a href="../time/time.html"><i class="bi bi-clock-history"></i> Time tracking</a></li>
      <li><a href="../calendar/calendar.html"><i class="bi bi-calendar-event"></i> Calendar</a></li>
      <li><a href="../friends/friends.html"><i class="bi bi-people"></i> Friends</a></li>
      <li><a href="../profile/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
      <li><a href="../feedback/feedback.html"><i class="bi bi-envelope-paper"></i> Feedback</a></li>
    </ul>

    <div class="sidebar-footer">
      <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <h2 class="top-greeting">Collaboration Hub</h2>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createTeamModal">
        <i class="bi bi-plus-lg"></i> Create New Team
      </button>
    </header>

    <div class="container-fluid mt-4">
      <p class="text-muted">Join forces with others to manage projects together.</p>

      <!-- INVITATIONS SECTION -->
    <div id="invitations-container" class="mb-5">
    
    </div>

 

      <!-- Team Grid -->
      <div id="teams-container" class="row g-4">
        <div class="col-12 text-center mt-5">
          <div class="spinner-border text-success" role="status"></div>
          <p>Loading your teams...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Create Team Modal -->
  <div class="modal fade" id="createTeamModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create a New Team</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="create-team-form">
            <div class="mb-3">
              <label class="form-label">Team Name</label>
              <input id="team-name" class="form-control" placeholder="e.g. CA3 Project Group" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea id="team-desc" class="form-control" placeholder="What is this team working on?"></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Create Team</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toast-message">
                <!-- Message will be inserted here -->
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="teams.js"></script>
</body>

</html>
